name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore "PackageXmlGenerator.sln"

      - name: Build
        run: dotnet build "PackageXmlGenerator.sln" --configuration Release --no-restore

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime:
          - win-x64
          - linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish app
        run: >
          dotnet publish "PackageXmlGenerator/PackageXmlGenerator.csproj"
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:PublishTrimmed=false
          --output "artifacts/${{ matrix.runtime }}"

      - name: Archive
        shell: bash
        run: |
          cd artifacts
          zip -r "PackageXmlGenerator-${{ matrix.runtime }}.zip" "${{ matrix.runtime }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PackageXmlGenerator-${{ matrix.runtime }}.zip
